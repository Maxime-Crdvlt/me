<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Formulaire Administrateur - Maxime Courdavault</title>
    <link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/4.0.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-brands/css/uicons-brands.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-bold-rounded/css/uicons-bold-rounded.css'>
</head>

<body>
    <main class="container">
        <h1 class="text-center">Panel Administrateur</h1>
        <form id="form-admin" action="/api/login.php" method="POST">
            <div>
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" required />
            </div>
            <div>
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required />
            </div>
            <button type="submit" class="button-primary">Se connecter</button>
        </form>
    </main>
</body>

<div id="popup-overlay" class="overlay-cache"></div>
<div id="popup" class="popup popup-cache">
    <div class="text-icon">
        <i id="popup-icon" class="fi fi-br-check popup-icon icon-succes"></i>
        <p id="popup-message" class="popup-message"></p>
    </div>
</div>
<script src="/assets/js/login.js" defer></script>

</html>
